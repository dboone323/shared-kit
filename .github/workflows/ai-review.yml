name: 🤖 AI Code Review & Autofix

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: read

jobs:
  local-ai-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Local AI Review (Local Only)
        run: |
          echo "⚠️  Cloud-based AI review has been disabled to save costs."
          echo "💡 Please run './local-audit.sh' on your local machine to perform an AI-powered code review and autofix."
          echo "This script uses your local Ollama instance and incurs zero cloud costs."
          exit 0

      - name: Check for local script
        run: |
          if [ -f "./local-audit.sh" ]; then
            echo "✅ local-audit.sh found."
          else
            echo "❌ local-audit.sh missing. Please pull the latest changes."
          fi
